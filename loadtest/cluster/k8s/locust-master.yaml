apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  namespace: loadtest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-master
  template:
    metadata:
      labels:
        app: locust-master
    spec:
      containers:
        - name: master
          image: locustio/locust:2.37.14
          args: ["-f", "/mnt/locust/locustfile.py", "--master", "--master-bind-host", "0.0.0.0"]
          ports:
            - containerPort: 8089
            - containerPort: 5557
            - containerPort: 5558
          env:
            - name: ALLOWED_HOSTS
              value: "coccimarket-dlc.duckdns.org"
            - name: ERROR_RATIO_ABORT_THRESHOLD
              value: "0.05"
            - name: MIN_REQUESTS_BEFORE_ABORT
              value: "500"
            - name: PER_USER_RPS
              value: "2"
          volumeMounts:
            - name: locust-scripts
              mountPath: /mnt/locust
      volumes:
        - name: locust-scripts
          configMap:
            name: locust-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: locust-master
  namespace: loadtest
spec:
  type: LoadBalancer
  selector:
    app: locust-master
  ports:
    - name: web
      port: 8089
      targetPort: 8089
    - name: master
      port: 5557
      targetPort: 5557
    - name: master2
      port: 5558
      targetPort: 5558
