services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coccimarket_staging
    ports:
      - '5433:5432'
    volumes:
      - pgdata_staging:/var/lib/postgresql/data

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/coccimarket_staging?schema=public
      APP_URL: https://staging.coccimarket-dlc.duckdns.org
      TZ: Europe/Paris
      NODE_ENV: production
    depends_on:
      - db
    ports:
      - '3001:3000'

  worker:
    build:
      context: .
      args:
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/coccimarket_staging?schema=public
      TZ: Europe/Paris
      NODE_ENV: production
    depends_on:
      - db
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run notify:cron"

volumes:
  pgdata_staging:
